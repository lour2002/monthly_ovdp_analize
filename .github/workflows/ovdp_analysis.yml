name: OVDP Monthly Analysis

on:
  schedule:
    - cron: '0 9 20 * *'   # every 20th at 09:00 UTC
  workflow_dispatch:         # manual trigger for testing

jobs:
  analyze:
    name: Fetch & fire OVDP routine
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run OVDP analysis
        env:
          ANTHROPIC_ROUTINE_TOKEN: ${{ secrets.ANTHROPIC_ROUTINE_TOKEN }}
        run: python analyze_ovdp.py
